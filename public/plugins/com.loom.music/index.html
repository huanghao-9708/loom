<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumo Music Player</title>
  <script src="../../loom-sdk.js"></script>
  <script src="libs/tailwindcss.js"></script>
  <script src="libs/jsmediatags.min.js"></script>
  <script src="libs/vue.global.prod.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bg-base': '#ffffff',
            'bg-secondary': '#f9fafb',
            'text-primary': '#111827',
            'text-secondary': '#4b5563',
            'text-muted': '#9ca3af',
            'border-light': '#e5e7eb',
            'accent': '#ff5c00'
          },
          fontFamily: {
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg-base text-text-primary antialiased m-0 p-0 h-screen w-screen overflow-hidden text-[13px] font-sans selection:bg-black selection:text-white">
  <div id="app" class="h-full w-full"></div>
  <script>
    window.addEventListener('error', function(e) {
      document.getElementById('app').innerHTML = '<div style="color:red; padding:20px;"><b>Error:</b> ' + e.message + '<br>' + e.filename + ':' + e.lineno + '</div>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      document.getElementById('app').innerHTML = '<div style="color:red; padding:20px;"><b>Unhandled Promise:</b> ' + e.reason + '</div>';
    });
  </script>
  <script src="./src/context.js"></script>
  <script src="./src/Scanner.js"></script>
  <script src="./src/App.js"></script>
  <script src="./src/main.js"></script>
</body>
</html>
