<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Lumo - Music Player</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --surface-color: #f8f9fa;
      --border-color: #e9ecef;
      --text-main: #212529;
      --text-muted: #6c757d;
      --accent-color: #4f7cff;
      --hover-bg: #f1f3f5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    
    /* Header (Toolbar) */
    header {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-color);
      background: var(--surface-color);
    }
    .logo { font-weight: bold; font-size: 16px; margin-right: 20px; color: var(--accent-color); }
    .toolbar-group { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    input[type="number"], input[type="text"] {
      padding: 4px 8px; border: 1px solid var(--border-color); border-radius: 4px; outline: none; font-size: 13px;
    }
    button {
      padding: 5px 12px; background: var(--text-main); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; transition: background 0.2s;
    }
    button:hover { background: #343a40; }
    button:active { transform: scale(0.98); }

    /* Main Layout */
    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    /* Track List */
    .track-list {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--border-color); }
    th { color: var(--text-muted); font-weight: 500; font-size: 12px; position: sticky; top: -20px; background: var(--bg-color); }
    tr.track-row:hover { background: var(--hover-bg); cursor: pointer; }
    tr.track-row.active { background: #eef2ff; color: var(--accent-color); font-weight: 600; }
    
    /* Player Bar */
    .player-bar {
      height: 70px;
      background: var(--surface-color);
      border-top: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 20px;
      justify-content: space-between;
    }
    .now-playing { display: flex; flex-direction: column; width: 250px; }
    .now-playing .title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .now-playing .artist { font-size: 12px; color: var(--text-muted); }
    
    .controls { display: flex; align-items: center; gap: 15px; flex: 1; justify-content: center; }
    .btn-circle { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--text-main); color: #fff; cursor: pointer; border: none; transition: 0.2s; }
    .btn-circle:hover { background: var(--accent-color); transform: scale(1.05); }
    
    .progress-container { flex: 1; max-width: 400px; display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-muted); }
    .progress-bar { flex: 1; height: 4px; background: var(--border-color); border-radius: 2px; cursor: pointer; position: relative; }
    .progress-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--accent-color); border-radius: 2px; width: 0%; pointer-events: none; }
    
    /* Toast */
    .toast { position: absolute; bottom: 80px; right: 20px; background: #333; color: #fff; padding: 10px 16px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-overlay.show { opacity: 1; pointer-events: auto; }
    .modal-content { background: var(--bg-color); width: 400px; max-width: 90vw; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { padding: 12px 20px; font-weight: 600; border-bottom: 1px solid var(--border-color); background: var(--surface-color); font-size: 14px; }
    .modal-body { padding: 16px; flex: 1; overflow-y: auto; max-height: 400px; display: flex; flex-direction: column; gap: 10px; font-size: 13px; }
    .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 10px; background: var(--surface-color); }
    .modal-footer button { padding: 6px 16px; }
    .btn-outline { background: transparent; color: var(--text-main); border: 1px solid var(--border-color); }
    .btn-outline:hover { background: var(--hover-bg); }
    
    .breadcrumb { display: flex; align-items: center; gap: 5px; color: var(--accent-color); font-weight: 500; flex-wrap: wrap; margin-bottom: 8px; cursor: pointer; }
    .breadcrumb-item:hover { text-decoration: underline; }
    .folder-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
    .folder-item:hover { background: var(--hover-bg); }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">Lumo Music</div>
    <div class="toolbar-group">
      <button id="btnOpenPicker" class="btn-outline">Select Directory</button>
      <span id="selectedDirDisplay" style="font-size: 13px; font-weight: 500; color: var(--accent-color);">/</span>
      <button id="btnScan" style="margin-left: 10px;">Scan Audio Files</button>
      <span id="scanStatus" style="color: var(--text-muted); margin-left: 10px;"></span>
      
      <!-- Hidden states -->
      <input type="hidden" id="scanSourceId" value="1">
      <input type="hidden" id="scanPath" value="/">
    </div>
  </header>

  <!-- Directory Picker Modal -->
  <div id="dirPickerModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">Select Directory</div>
      <div class="modal-body">
        <select id="pickerSourceSelect" style="padding: 6px; border: 1px solid var(--border-color); border-radius: 4px; width: 100%;"></select>
        <div id="pickerBreadcrumb" class="breadcrumb">
          <div class="breadcrumb-item" data-path="/">/</div>
        </div>
        <div id="pickerTree" style="display: flex; flex-direction: column; gap: 4px;">
          <!-- Loaded dynamically -->
        </div>
      </div>
      <div class="modal-footer">
        <button id="btnPickerCancel" class="btn-outline">Cancel</button>
        <button id="btnPickerConfirm">Select Current</button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-container">
    <div class="track-list">
      <table>
        <thead>
          <tr>
            <th style="width: 50px;">#</th>
            <th>Title</th>
            <th>Artist</th>
            <th>Album</th>
            <th>Size</th>
          </tr>
        </thead>
        <tbody id="trackListBody">
          <!-- JS Rendered -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Player Bar -->
  <div class="player-bar">
    <div class="now-playing">
      <div class="title" id="npTitle">No track selected</div>
      <div class="artist" id="npArtist">-</div>
    </div>
    
    <div class="controls">
      <div class="progress-container">
        <span id="timeCurrent">0:00</span>
        <div class="progress-bar" id="progressBar" onclick="seekAudio(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span id="timeTotal">0:00</span>
      </div>
      <button class="btn-circle" id="btnPlayPause" style="margin-left: 20px;">▶</button>
    </div>
    
    <div style="width: 250px; text-align: right; font-size: 12px; color: var(--text-muted);">
      <span id="formatInfo">MP3 / 320kbps</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Native Audio Element -->
  <audio id="audioElement" preload="metadata"></audio>

  <!-- Scripts -->
  <script src="/loom-sdk.js"></script>
  <script>
    let tracks = [];
    let currentTrackId = null;
    let isPlaying = false;
    const audio = document.getElementById('audioElement');
    
    const els = {
      tbody: document.getElementById('trackListBody'),
      npTitle: document.getElementById('npTitle'),
      npArtist: document.getElementById('npArtist'),
      btnPlayPause: document.getElementById('btnPlayPause'),
      progressFill: document.getElementById('progressFill'),
      timeCurrent: document.getElementById('timeCurrent'),
      timeTotal: document.getElementById('timeTotal'),
      toast: document.getElementById('toast'),
      scanStatus: document.getElementById('scanStatus')
    };

    function showToast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add('show');
      setTimeout(() => els.toast.classList.remove('show'), 3000);
    }

    function formatTime(sec) {
      if (isNaN(sec)) return "0:00";
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function formatBytes(bytes) {
      if (!bytes) return "0 B";
      const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // Audio Event Listeners
    audio.addEventListener('timeupdate', () => {
      els.timeCurrent.textContent = formatTime(audio.currentTime);
      if (audio.duration) {
        const pct = (audio.currentTime / audio.duration) * 100;
        els.progressFill.style.width = pct + '%';
      }
    });

    audio.addEventListener('loadedmetadata', () => {
      els.timeTotal.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('ended', () => {
      // Very simple auto-play next logic
      const idx = tracks.findIndex(t => t.id === currentTrackId);
      if (idx !== -1 && idx < tracks.length - 1) {
        playTrack(tracks[idx + 1]);
      } else {
        isPlaying = false;
        els.btnPlayPause.textContent = "▶";
      }
    });

    els.btnPlayPause.addEventListener('click', () => {
      if (!currentTrackId && tracks.length > 0) {
        playTrack(tracks[0]);
        return;
      }
      if (audio.paused) {
        const p = audio.play();
        if (p !== undefined) {
          p.then(() => {
            isPlaying = true;
            els.btnPlayPause.textContent = "⏸";
          }).catch(e => {
            if (e.name !== 'AbortError') console.error(e);
          });
        }
      } else {
        audio.pause();
        isPlaying = false;
        els.btnPlayPause.textContent = "▶";
      }
    });

    window.seekAudio = (e) => {
      if (!audio.duration) return;
      const bar = document.getElementById('progressBar');
      const rect = bar.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pct * audio.duration;
    };

    // Load Tracks from DB
    async function loadLibrary() {
      try {
        const rows = await loom.db.query(`
          SELECT t.id, t.title, t.track_no, m.file_size, m.vpath, m.source_id, m.file_ext
          FROM tracks t
          JOIN media_files m ON t.primary_file_id = m.id
          ORDER BY t.id DESC
        `);
        tracks = rows;
        renderTrackList();
      } catch (e) {
        console.error("Failed to load library:", e);
      }
    }

    function renderTrackList() {
      els.tbody.innerHTML = '';
      if (tracks.length === 0) {
        els.tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#999;padding:40px;">No tracks found. Please scan a directory.</td></tr>`;
        return;
      }

      tracks.forEach((t, i) => {
        const tr = document.createElement('tr');
        tr.className = `track-row ${currentTrackId === t.id ? 'active' : ''}`;
        tr.onclick = () => playTrack(t);
        
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td style="font-weight: 500;">${t.title}</td>
          <td style="color:var(--text-muted);">Unknown Artist</td>
          <td style="color:var(--text-muted);">Unknown Album</td>
          <td>${formatBytes(t.file_size)}</td>
        `;
        els.tbody.appendChild(tr);
      });
    }

    let playPromise = null;

    function playTrack(track) {
      const isSameTrack = currentTrackId === track.id;
      if (isSameTrack && !audio.paused) return; // already playing
      
      currentTrackId = track.id;
      renderTrackList(); // update active class
      
      els.npTitle.textContent = track.title;
      document.getElementById('formatInfo').textContent = track.file_ext ? track.file_ext.toUpperCase() : "AUDIO";

      if (!isSameTrack) {
        audio.src = `http://loom.localhost/preview/${track.source_id}${track.vpath.startsWith('/') ? track.vpath : '/' + track.vpath}`;
      }
      
      playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          isPlaying = true;
          els.btnPlayPause.textContent = "⏸";
        }).catch(e => {
          if (e.name === 'AbortError') return; // Ignore interruption
          showToast("Error playing file");
          console.error("Playback error:", e);
        });
      }
    }

    // Scanning Logic
    document.getElementById('btnScan').addEventListener('click', async () => {
      const sourceId = parseInt(document.getElementById('scanSourceId').value);
      const path = document.getElementById('scanPath').value;
      if (!sourceId) { showToast("Invalid Source ID"); return; }
      
      els.scanStatus.textContent = "Scanning...";
      let added = 0;
      
      try {
        const files = await loom.vfs.list(sourceId, path);
        // Extremely simple flatten and filter for mp3/flac
        const audioExts = ['.mp3', '.flac', '.wav', '.m4a', '.ogg'];
        
        // Recursive walk helper
        async function walk(currentPath) {
          try {
            const nodes = await loom.vfs.list(sourceId, currentPath);
            for (const node of nodes) {
              if (node.is_dir) {
                // Recursively fetch and walk subdirectories
                await walk(node.vpath);
              } else {
                const ext = node.name.substring(node.name.lastIndexOf('.')).toLowerCase();
                if (audioExts.includes(ext)) {
                  // Check if already in DB
                  const exist = await loom.db.query("SELECT id FROM media_files WHERE source_id = ? AND vpath = ?", [sourceId, node.vpath]);
                  if (exist.length === 0) {
                    // Fallback: Use filename without ext as Title
                    const title = node.name.substring(0, node.name.lastIndexOf('.'));
                    
                    // Insert media_file
                    await loom.db.query(
                      "INSERT INTO media_files (source_id, vpath, file_ext, file_size) VALUES (?, ?, ?, ?)",
                      [sourceId, node.vpath, ext, node.size_bytes || 0]
                    );
                    const mfRows = await loom.db.query("SELECT id FROM media_files WHERE source_id = ? AND vpath = ?", [sourceId, node.vpath]);
                    const mfId = mfRows[0].id;
                    
                    // Insert track
                    await loom.db.query(
                      "INSERT INTO tracks (title, normalized_title, primary_file_id) VALUES (?, ?, ?)",
                      [title, title.toLowerCase(), mfId]
                    );
                    
                    // Update mf with track_id
                    const trackRows = await loom.db.query("SELECT id FROM tracks ORDER BY id DESC LIMIT 1");
                    const trackId = trackRows[0].id;
                    await loom.db.query("UPDATE media_files SET track_id = ? WHERE id = ?", [trackId, mfId]);
                    
                    added++;
                  }
                }
              }
            }
          } catch(e) {
            console.warn(`Failed to read directory: ${currentPath}`, e);
          }
        }
        
        await walk(path);
        els.scanStatus.textContent = `Done. Added ${added} tracks.`;
        setTimeout(() => els.scanStatus.textContent = "", 3000);
        
        await loadLibrary();
        showToast("Scan completed!");
        
      } catch (e) {
        els.scanStatus.textContent = "Error!";
        console.error("Scan error", e);
        showToast(e.toString());
      }
    });

    // Directory Picker Logic
    const pickerModal = document.getElementById('dirPickerModal');
    const pickerSourceSelect = document.getElementById('pickerSourceSelect');
    const pickerBreadcrumb = document.getElementById('pickerBreadcrumb');
    const pickerTree = document.getElementById('pickerTree');
    let pickerCurrentPath = "/";

    document.getElementById('btnOpenPicker').addEventListener('click', () => {
      pickerModal.classList.add('show');
      if (pickerSourceSelect.options.length > 0) {
        loadPickerDir(parseInt(pickerSourceSelect.value), pickerCurrentPath);
      }
    });

    document.getElementById('btnPickerCancel').addEventListener('click', () => {
      pickerModal.classList.remove('show');
    });

    document.getElementById('btnPickerConfirm').addEventListener('click', () => {
      document.getElementById('scanSourceId').value = pickerSourceSelect.value;
      document.getElementById('scanPath').value = pickerCurrentPath;
      document.getElementById('selectedDirDisplay').textContent = pickerCurrentPath;
      pickerModal.classList.remove('show');
    });

    pickerSourceSelect.addEventListener('change', () => {
      loadPickerDir(parseInt(pickerSourceSelect.value), "/");
    });

    async function loadPickerDir(sourceId, path) {
      pickerCurrentPath = path;
      pickerBreadcrumb.innerHTML = '';
      const parts = path.split('/').filter(p => p);
      
      let curr = '/';
      const rootEl = document.createElement('div');
      rootEl.className = 'breadcrumb-item';
      rootEl.textContent = 'Root';
      rootEl.onclick = () => loadPickerDir(sourceId, '/');
      pickerBreadcrumb.appendChild(rootEl);

      parts.forEach(p => {
        pickerBreadcrumb.appendChild(document.createTextNode(' / '));
        curr += p + '/';
        const el = document.createElement('div');
        el.className = 'breadcrumb-item';
        el.textContent = p;
        const targetPath = curr;
        el.onclick = () => loadPickerDir(sourceId, targetPath.slice(0, -1));
        pickerBreadcrumb.appendChild(el);
      });

      pickerTree.innerHTML = '<div style="padding: 10px; color: var(--text-muted);">Loading...</div>';
      try {
        const files = await loom.vfs.list(sourceId, path);
        pickerTree.innerHTML = '';
        const dirs = files.filter(f => f.is_dir);
        if (dirs.length === 0) {
          pickerTree.innerHTML = '<div style="padding: 10px; color: var(--text-muted); font-style: italic;">No subdirectories</div>';
        } else {
          dirs.forEach(d => {
            const el = document.createElement('div');
            el.className = 'folder-item';
            el.innerHTML = `📁 <span>${d.name}</span>`;
            el.onclick = () => loadPickerDir(sourceId, d.vpath);
            pickerTree.appendChild(el);
          });
        }
      } catch(e) {
        pickerTree.innerHTML = `<div style="padding: 10px; color: red;">Error: ${e}</div>`;
      }
    }

    async function loadSources() {
      try {
        const sources = await loom.vfs.getSources();
        pickerSourceSelect.innerHTML = '';
        sources.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = s.name;
          pickerSourceSelect.appendChild(opt);
        });
        
        if (sources.length > 0) {
          document.getElementById('scanSourceId').value = sources[0].id;
        }
      } catch(e) {
        console.error("Failed to load sources:", e);
      }
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(async () => {
        if (window.loom) {
          try {
            // Apply migrations: using embedded SQL to bypass iframe CORS
            const MIGRATION_SQL = `
              CREATE TABLE IF NOT EXISTS artists (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  name TEXT NOT NULL,
                  normalized_name TEXT NOT NULL,
                  created_at TEXT NOT NULL DEFAULT (datetime('now'))
              );
              CREATE TABLE IF NOT EXISTS albums (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  title TEXT NOT NULL,
                  normalized_title TEXT NOT NULL,
                  album_artist_id INTEGER REFERENCES artists(id) ON DELETE SET NULL,
                  cover_vpath TEXT,
                  cover_source_id INTEGER,
                  release_year INTEGER,
                  created_at TEXT NOT NULL DEFAULT (datetime('now'))
              );
              CREATE TABLE IF NOT EXISTS tracks (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  title TEXT NOT NULL,
                  normalized_title TEXT NOT NULL,
                  album_id INTEGER REFERENCES albums(id) ON DELETE SET NULL,
                  track_no INTEGER,
                  primary_file_id INTEGER,
                  play_count INTEGER NOT NULL DEFAULT 0,
                  last_played_at TEXT,
                  created_at TEXT NOT NULL DEFAULT (datetime('now'))
              );
              CREATE TABLE IF NOT EXISTS media_files (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  source_id INTEGER NOT NULL,
                  vpath TEXT NOT NULL,
                  track_id INTEGER REFERENCES tracks(id) ON DELETE SET NULL,
                  file_ext TEXT,
                  file_size INTEGER,
                  duration_ms INTEGER,
                  bitrate INTEGER,
                  created_at TEXT NOT NULL DEFAULT (datetime('now'))
              );
              CREATE UNIQUE INDEX IF NOT EXISTS idx_media_files_vpath ON media_files(source_id, vpath);
              CREATE TABLE IF NOT EXISTS playlists (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  name TEXT NOT NULL,
                  created_at TEXT NOT NULL DEFAULT (datetime('now'))
              );
              CREATE TABLE IF NOT EXISTS playlist_items (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  playlist_id INTEGER NOT NULL REFERENCES playlists(id) ON DELETE CASCADE,
                  track_id INTEGER NOT NULL REFERENCES tracks(id) ON DELETE CASCADE,
                  position INTEGER NOT NULL,
                  added_at TEXT NOT NULL DEFAULT (datetime('now'))
              );
            `;
            
            const statements = MIGRATION_SQL.split(';').map(s => s.trim()).filter(s => s.length > 0);
            for (const stmt of statements) {
              await loom.db.execute(stmt);
            }

            await loadLibrary();
            await loadSources();
          } catch(e) {
            console.error("Initialization error:", e);
            showToast("Init error: " + e.toString());
          }
        } else {
          showToast("Loom SDK not found. Running outside sandbox?");
        }
      }, 500);
    });

  </script>
</body>
</html>
